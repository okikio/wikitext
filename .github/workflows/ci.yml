# Runs on every push and pull request to keep main green.
#
# Jobs:
#   lint   - deno lint (static analysis, no false positives)
#   fmt    - deno fmt --check (formatting gate; use `deno fmt` locally to fix)
#   test   - full test suite with leak tracing + GC exposure
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2

      - name: Cache Deno deps
        uses: actions/cache@v5
        with:
          path: ~/.cache/deno
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-

      - name: Lint
        run: deno lint
      - name: Doc Lint
        run: deno doc --lint mod.ts

  # fmt:
  #   name: Format
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: denoland/setup-deno@v2

  #     - name: Cache Deno deps
  #       uses: actions/cache@v5
  #       with:
  #         path: ~/.cache/deno
  #         key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
  #         restore-keys: |
  #           ${{ runner.os }}-deno-

  #     - name: Check formatting
  #       run: deno fmt --check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2

      - name: Cache Deno deps
        uses: actions/cache@v5
        with:
          path: ~/.cache/deno
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-

      - name: Run tests
        run: deno task test

  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2

      - name: Cache Deno deps
        uses: actions/cache@v5
        with:
          path: ~/.cache/deno
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.lock') }}
          restore-keys: |
            ${{ runner.os }}-deno-

      - name: Run benchmarks
        run: deno task bench
